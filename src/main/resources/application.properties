jwt.auth.converter.principle-attribute=preferred_username


spring.datasource.url=jdbc:postgresql://localhost:5432/gestionale_banca
spring.datasource.username=postgres
spring.datasource.password=postgres
# Aggiunto pool di connessioni HikariCP per performance
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

# ===================================================================
# Configurazione JPA/Hibernate (Consigliata)
# ===================================================================
# In produzione usa 'validate' o 'none', 'update' va bene solo per sviluppo
spring.jpa.hibernate.ddl-auto=update
# Mostra le query in console per debug
spring.jpa.show-sql=true
# Formattazione leggibile delle query SQL
spring.jpa.properties.hibernate.format_sql=true
# Dialect moderno (PostgreSQLDialect rileva automaticamente la versione)
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ===================================================================
# Log di sicurezza
# ===================================================================
logging.level.org.springframework.security=DEBUG