spring.security.oauth2.resourceserver.jwt.issuer-uri=${KEYCLOAK_ISSUER_URI:http://localhost:9090/realms/gestionale-banca}
keycloak.server-url=${KEYCLOAK_SERVER_URL:http://localhost:9090}
keycloak.realm=${KEYCLOAK_REALM:gestionale-banca}
keycloak.service-client-id=${KEYCLOAK_SERVICE_CLIENT_ID:banca-service}
keycloak.service-client-secret=${KEYCLOAK_SERVICE_CLIENT_SECRET}
jwt.auth.converter.principle-attribute=preferred_username

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/gestionale_banca}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true

server.port=8080

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

app.transaction.fee-percentage=0.02

# Default 'false': va abilitato esplicitamente via .env, solo in locale (vedi
# DefaultAdminBootstrapper e .env.example).
app.bootstrap.default-admin.enabled=${BOOTSTRAP_DEFAULT_ADMIN:false}
app.bootstrap.default-admin.password=${BOOTSTRAP_DEFAULT_ADMIN_PASSWORD:}

app.bootstrap.test-users.enabled=${BOOTSTRAP_TEST_USERS:false}
