
spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:9090/realms/gestionale-banca
keycloak.client-id=banca-client
keycloak.client-secret=CnzVSL4wx31Oi480XAFPw741uMujVWlU
keycloak.admin.username=admin
