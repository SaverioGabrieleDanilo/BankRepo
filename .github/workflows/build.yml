name: Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: gestionale_banca
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: root
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # GestionaleBancaApplicationTests (@SpringBootTest) richiede anche un
      # Keycloak gia' configurato col realm applicativo: fuori scope per questo
      # workflow minimale, il context-load resta da verificare in locale.
      - name: Build and test
        run: |
          chmod +x mvnw
          ./mvnw -B verify -Dtest='!GestionaleBancaApplicationTests' -DfailIfNoTests=false
