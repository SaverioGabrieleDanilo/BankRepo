# Tema custom per la pagina di login Keycloak, allineato al frontend Angular
# (repo BankRepo-front: src/app/features/auth/login/).
#
# parent=keycloak: eredita gli asset JS (passwordVisibility.js, authChecker.js,
# menu-button-links.js) e la logica dei template. import=common/keycloak per gli
# stessi motivi. NON tocchiamo login.ftl: tutta la resa visiva passa da qui
# (rimappatura classi) e da template.ftl (solo elementi nuovi, aggiunti attorno
# alla logica esistente, mai dentro).
parent=keycloak
import=common/keycloak

styles=css/banca-theme.css

# --- Rimappatura delle classi sui nomi usati in login-form.component.scss / login.component.scss ---
# kcHtmlClass vuota: il default "login-pf" ereditato attiva regole scoped di
# Patternfly (.login-pf body { background: bg-login.jpg ... }, specificita' 0,0,2,0)
# che vincono sul nostro "body { background-color: ... }" (0,0,0,1) e lasciano
# uno sfondo scuro visibile attorno alla card. Azzerarla neutralizza quelle
# regole alla fonte invece di rincorrerle con !important.
kcHtmlClass=
kcLoginClass=login-page
kcHeaderClass=login-header
kcFormCardClass=login-card glass-panel
kcFormHeaderClass=login-card__header

kcFormGroupClass=login-form__field-group
kcLabelClass=login-form__label
kcInputClass=login-form__input
kcInputGroup=login-form__input-wrapper
kcInputErrorMessageClass=login-form__error

kcFormOptionsWrapperClass=login-form__utilities
kcFormSettingClass=login-form__utilities-row

kcButtonClass=login-form__submit
kcButtonPrimaryClass=btn-primary
kcButtonBlockClass=
kcButtonLargeClass=

kcFormPasswordVisibilityButtonClass=login-form__toggle-visibility
kcAlertClass=login-alert
kcAlertTitleClass=login-alert__title

kcSignUpClass=login-registration
